<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src *; img-src * data:;">
  <title>LevisIDE Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/utilities.css">
  <style>
    body { margin: 0; background: #0a0a0f; color: #e8e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #panel-bar {
      -webkit-app-region: drag;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      background: #1a1a24;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .panel-title { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: #ffa500; }
    .panel-window-controls { display: flex; -webkit-app-region: no-drag; margin-left: auto; gap: 2px; }
    .panel-window-controls button {
      background: transparent; border: none; color: #9999ad;
      width: 32px; height: 24px; font-size: 12px; cursor: pointer; border-radius: 4px;
    }
    .panel-window-controls button:hover { background: rgba(255,255,255,0.08); color: #e8e8f0; }
    .panel-window-controls #panel-close:hover { background: #ef4444 !important; color: white !important; }
    #panel-return {
      -webkit-app-region: no-drag;
      background: transparent; border: 1px solid #2d303c; color: #b8bac8;
      padding: 4px 12px; border-radius: 12px; font-size: 11px;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 120ms ease;
    }
    #panel-return:hover { background: #272a35; border-color: #ff7a1a; color: #ff7a1a; }
    #panel-content { flex: 1; min-height: 0; display: flex; }
  </style>
</head>
<body>
  <div id="panel-bar">
    <span class="panel-title" id="panel-title">Panel</span>
    <button id="panel-return" title="Vrátit panel zpět do hlavního okna">‹ Vrátit do workspace</button>
    <span style="flex:1"></span>
    <div class="panel-window-controls">
      <button id="panel-min" title="Minimalizovat">&#x2500;</button>
      <button id="panel-max" title="Maximalizovat">&#x25A1;</button>
      <button id="panel-close" title="Zavřít">&#x2715;</button>
    </div>
  </div>
  <div id="panel-content"></div>

  <!-- xterm UMD pro terminal panel -->
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>

  <script src="../dist/src/popout-panel.js"></script>
</body>
</html>
