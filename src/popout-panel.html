<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https: http: ws: wss:; img-src 'self' https: http: data: blob:;">
  <title>LevisIDE Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/utilities.css">
  <style>
    /* Jen body layout — ostatní (bar, buttons) jsou sdílené v layout.css */
    body { margin: 0; background: var(--bg-deep, #0a0a0f); color: var(--text, #e8e8f0); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #panel-content { flex: 1; min-height: 0; display: flex; }
  </style>
</head>
<body>
  <div id="panel-bar" class="lvi-popbar">
    <span class="lvi-popbar-title" id="panel-title">Panel</span>
    <div id="panel-actions" style="display:flex;gap:2px;margin-left:8px;"></div>
    <span style="flex:1"></span>
    <button id="panel-return" class="lvi-popbtn" data-i18n-title="panel.return" title="Vrátit panel zpět do hlavního okna"><svg class="lvi" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="19 12 5 12"/><polyline points="12 19 5 12 12 5"/></svg></button>
    <button id="panel-fullscreen" class="lvi-popbtn" data-i18n-title="popout.fullscreen" title="Fullscreen"><svg class="lvi" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
    <div class="lvi-win-controls">
      <button id="panel-min" class="lvi-win-btn" data-i18n-title="panel.minimize" title="Minimalizovat">&#x2500;</button>
      <button id="panel-max" class="lvi-win-btn" data-i18n-title="panel.maximize" title="Maximalizovat">&#x25A1;</button>
      <button id="panel-close" class="lvi-win-btn lvi-win-btn-close" data-i18n-title="panel.close" title="Zavřít">&#x2715;</button>
    </div>
  </div>
  <div id="panel-content"></div>

  <!-- xterm UMD pro terminal panel -->
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../node_modules/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="../node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>

  <script src="../dist/src/i18n.js"></script>
  <script src="../dist/src/popout-panel.js"></script>
</body>
</html>
