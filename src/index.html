<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src *; img-src * data:; frame-src *;">
  <title>LevisIDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/hub.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/artifact.css">
  <link rel="stylesheet" href="css/utilities.css">
</head>
<body>
  <!-- Tab bar -->
  <div id="tab-bar">
    <div class="tab-logo"><img src="../assets/icon.svg" alt="" class="tab-logo-icon"> LevisIDE</div>
    <div id="tabs">
      <div class="tab tab-hub active" data-tab="hub">
        <svg class="lvi tab-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
    </div>
    <button id="btn-help" title="Nápověda a klávesové zkratky (F1)">?</button>
    <button id="btn-settings" title="Nastavení">
      <svg class="lvi" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div id="window-controls">
      <button id="btn-min" title="Minimalizovat okno">&#x2500;</button>
      <button id="btn-max" title="Maximalizovat / obnovit">&#x25A1;</button>
      <button id="btn-close" title="Zavřít LevisIDE">&#x2715;</button>
    </div>
  </div>

  <!-- Content -->
  <div id="content"></div>

  <!-- xterm UMD bundles (musi byt pred terminal.js) -->
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../node_modules/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="../node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>

  <!-- Scripts (order matters) -->
  <script src="../dist/src/i18n.js"></script>
  <script src="../dist/src/toast.js"></script>
  <script src="../dist/src/command-palette.js"></script>
  <script src="../dist/src/file-tree.js"></script>
  <script src="../dist/src/editor.js"></script>
  <script src="../dist/src/diff-viewer.js"></script>
  <script src="../dist/src/gral-picker.js"></script>
  <script src="../dist/src/inspector.js"></script>
  <script src="../dist/src/gral-audit.js"></script>
  <script src="../dist/src/token-viewer.js"></script>
  <script src="../dist/src/hub.js"></script>
  <script src="../dist/src/cc-state.js"></script>
  <script src="../dist/src/dock.js"></script>
  <script src="../dist/src/icons.js"></script>
  <script src="../dist/src/grid.js"></script>
  <script src="../dist/src/quick-file-open.js"></script>
  <script src="../dist/src/project-search.js"></script>
  <script src="../dist/src/terminal.js"></script>
  <script src="../dist/src/browser.js"></script>
  <script src="../dist/src/workspace.js"></script>
  <script src="../dist/src/app.js"></script>
</body>
</html>
