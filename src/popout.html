<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https: http: ws: wss:; img-src 'self' https: http: data: blob:; frame-src 'self' https: http: file:;">
  <title>LevisIDE — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">

<body>
  <div id="popout-bar">
    <span class="popout-title">LevisIDE Browser</span>
    <span style="flex:1"></span>
    <button class="pop-btn pop-return" id="pop-return" data-i18n-title="popout.return" title="Vrátit náhled do hlavního okna"><svg class="lvi" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="19 12 5 12"/><polyline points="12 19 5 12 12 5"/></svg></button>
    <button class="pop-btn pop-fullscreen" data-i18n-title="popout.fullscreen" title="Fullscreen"><svg class="lvi" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
    <div id="popout-controls" class="lvi-win-controls">
      <button id="pop-min" class="lvi-win-btn">&#x2500;</button>
      <button id="pop-max" class="lvi-win-btn">&#x25A1;</button>
      <button id="pop-close" class="lvi-win-btn lvi-win-btn-close">&#x2715;</button>
    </div>
  </div>
  <div id="popout-content"></div>
  <script src="../dist/src/i18n.js"></script>
  <script src="../dist/src/icons.js"></script>
  <script src="../dist/src/toast.js"></script>
  <script src="../dist/src/inspector.js"></script>
  <script src="../dist/src/browser-host.js"></script>
  <script src="../dist/src/browser-core.js"></script>
  <script src="../dist/src/browser.js"></script>
  <script src="../dist/src/popout.js"></script>
</body>
</html>
